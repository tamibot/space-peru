<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Coordina Eventos">
  <title>Coordina Eventos — isotipo (match)</title>
  <!-- Concept: dos cuadrados que encajan = espacio que coordina con evento -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0B2A5C"/>
  <rect x="14" y="14" width="22" height="22" rx="4" fill="#FFFFFF"/>
  <rect x="34" y="34" width="16" height="16" rx="3" fill="#2563EB"/>
</svg>
