<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Coordina — Donde el evento empieza">
  <title>Coordina — OG image</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,144,700&family=Geist:wght@400;500;600&display=swap');
    .display { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 700; font-style: italic; font-variation-settings: 'opsz' 144; }
    .ui { font-family: 'Geist', system-ui, sans-serif; }
  </style>

  <!-- cream background -->
  <rect width="1200" height="630" fill="#FAF8F5"/>

  <!-- editorial vertical rule -->
  <rect x="72" y="72" width="2" height="486" fill="#0F0F0F"/>

  <!-- top-left wordmark -->
  <g transform="translate(96, 110)">
    <text x="0" y="0" class="display" font-size="34" letter-spacing="-0.03em" fill="#0F0F0F">coordina</text>
    <circle cx="180" cy="-7" r="4" fill="#B8451C"/>
  </g>

  <!-- main statement: italic + roman mix -->
  <g transform="translate(96, 270)">
    <text x="0" y="0" class="display" font-size="120" letter-spacing="-0.04em" fill="#0F0F0F">Donde el evento</text>
    <text x="0" y="130" class="display" font-size="120" letter-spacing="-0.04em" fill="#B8451C">empieza.</text>
  </g>

  <!-- subline -->
  <g transform="translate(96, 510)">
    <text x="0" y="0" class="ui" font-weight="400" font-size="22" fill="#5C5C5C">Espacios para eventos en Lima · coordinaeventos.com</text>
  </g>

  <!-- right side decorative shapes (peruvian sunset) -->
  <g opacity="0.85">
    <rect x="940" y="100" width="180" height="240" rx="8" fill="#0F0F0F"/>
    <rect x="900" y="200" width="180" height="240" rx="8" fill="#B8451C"/>
    <rect x="940" y="300" width="180" height="240" rx="8" fill="#F4B488"/>
  </g>

  <!-- subtle grain dots -->
  <g opacity="0.3" fill="#0F0F0F">
    <circle cx="200" cy="160" r="1"/>
    <circle cx="320" cy="200" r="1"/>
    <circle cx="450" cy="170" r="1"/>
    <circle cx="600" cy="220" r="1"/>
  </g>
</svg>
