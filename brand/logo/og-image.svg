<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Coordina">
  <title>Coordina — OG image</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');
    .sans { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  </style>

  <!-- background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- top wordmark -->
  <g transform="translate(80, 96)">
    <text x="0" y="0" class="sans" font-weight="700" font-size="32" letter-spacing="-0.035em" fill="#0A2540">coordina</text>
  </g>

  <!-- main statement -->
  <g transform="translate(80, 260)">
    <text x="0" y="0" class="sans" font-weight="700" font-size="92" letter-spacing="-0.04em" fill="#0A2540">El espacio para tu</text>
    <text x="0" y="106" class="sans" font-weight="700" font-size="92" letter-spacing="-0.04em" fill="#3D5AFE">próximo evento.</text>
  </g>

  <!-- subline -->
  <g transform="translate(80, 500)">
    <text x="0" y="0" class="sans" font-weight="500" font-size="24" fill="#697386">Encontramos el lugar. Coordinamos lo demás. Lima.</text>
  </g>

  <!-- bottom URL -->
  <g transform="translate(80, 558)">
    <text x="0" y="0" class="sans" font-weight="600" font-size="20" fill="#3D5AFE">coordinaeventos.com</text>
  </g>

  <!-- right side: subtle geometric accent (no peruvian sunset, just clean blocks) -->
  <g transform="translate(880, 180)">
    <rect x="0"   y="0"   width="240" height="120" rx="16" fill="#F6F9FC" stroke="#E3E8EE" stroke-width="1"/>
    <rect x="40"  y="140" width="240" height="120" rx="16" fill="#0A2540"/>
    <rect x="0"   y="280" width="240" height="120" rx="16" fill="#3D5AFE"/>
  </g>
</svg>
