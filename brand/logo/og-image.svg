<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="OG image — placeholder">
  <title>Open Graph image — placeholder</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- top-left wordmark -->
  <g transform="translate(64, 64)">
    <text x="0" y="40" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="40" fill="#0B1220" letter-spacing="-0.02em">planea</text>
    <text x="160" y="40" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="40" fill="#2563EB" letter-spacing="-0.02em">ya</text>
    <circle cx="232" cy="35" r="5" fill="#2563EB"/>
  </g>

  <!-- main headline -->
  <g transform="translate(64, 240)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="84" fill="#1E3A8A" letter-spacing="-0.02em">Encuentra tu espacio.</text>
    <text x="0" y="100" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="84" fill="#0B1220" letter-spacing="-0.02em">Sin perseguir nadie.</text>
  </g>

  <!-- subline -->
  <g transform="translate(64, 470)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="28" fill="#4B5563">Espacios por horas en Lima — asistente que te ayuda a encontrarlos.</text>
  </g>

  <!-- bottom right URL -->
  <g transform="translate(64, 560)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#2563EB">planearya.com</text>
  </g>

  <!-- decorative right side accent -->
  <g transform="translate(900, 90)">
    <rect x="0" y="0" width="240" height="160" rx="16" fill="#DBEAFE"/>
    <rect x="40" y="200" width="200" height="160" rx="16" fill="#BFDBFE"/>
    <rect x="0" y="380" width="200" height="160" rx="16" fill="#93C5FD" opacity="0.6"/>
  </g>
</svg>
