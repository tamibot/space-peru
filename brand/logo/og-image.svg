<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Coordina Eventos — Open Graph">
  <title>Coordina Eventos — OG image</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F6FA"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid texture: 6 vertical lines -->
  <g opacity="0.06" stroke="#0B2A5C" stroke-width="1">
    <line x1="200"  y1="0" x2="200"  y2="630"/>
    <line x1="400"  y1="0" x2="400"  y2="630"/>
    <line x1="600"  y1="0" x2="600"  y2="630"/>
    <line x1="800"  y1="0" x2="800"  y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- top-left wordmark -->
  <g transform="translate(72, 72)">
    <text x="0"   y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="34" letter-spacing="-0.025em" fill="#0B2A5C">coordina</text>
    <text x="180" y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="34" letter-spacing="-0.025em" fill="#2563EB">·</text>
    <text x="200" y="0" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="34" letter-spacing="-0.025em" fill="#4B6090">eventos</text>
  </g>

  <!-- main headline -->
  <g transform="translate(72, 270)">
    <text x="0" y="0"   font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="92" letter-spacing="-0.03em" fill="#0B2A5C">Donde el evento</text>
    <text x="0" y="108" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="92" letter-spacing="-0.03em" fill="#0B2A5C">empieza.</text>
  </g>

  <!-- subline -->
  <g transform="translate(72, 500)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="26" fill="#4B6090">Encuentra el espacio. Coordinamos lo demás. Lima.</text>
  </g>

  <!-- bottom URL -->
  <g transform="translate(72, 564)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" letter-spacing="-0.01em" fill="#2563EB">coordinaeventos.com</text>
  </g>

  <!-- right side: large isotipo as visual anchor -->
  <g transform="translate(820, 195)">
    <rect x="0"   y="0"   width="240" height="240" rx="36" fill="#0B2A5C"/>
    <rect x="44"  y="44"  width="92"  height="92"  rx="14" fill="#FFFFFF"/>
    <rect x="120" y="120" width="68"  height="68"  rx="10" fill="#2563EB"/>
  </g>
</svg>
